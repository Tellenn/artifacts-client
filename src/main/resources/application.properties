spring.application.name=tellenn-artifacts-client
artifacts.api.url=https://api.artifactsmmo.com
artifacts.websocket.url=wss://realtime.artifactsmmo.com
artifacts.api.key=LeaveEmpty
server.port=8888

# MongoDB Configuration
spring.data.mongodb.host=localhost
spring.data.mongodb.port=27017
spring.data.mongodb.database=artifacts


spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

# Monitoring (Prometheus)
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always
management.metrics.tags.application=${spring.application.name}

# Economy
artifacts.economy.gold-per-second=0.1

# Profiles
# Uncomment the line below to enable item sync on startup
# spring.profiles.active=item-sync
