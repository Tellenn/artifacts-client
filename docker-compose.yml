services:
  app:
    image: tellenn/tellenn-artifacts-client:latest
    restart: always
    ports:
      - "8880:8888"
    environment:
      - ARTIFACTS_API_KEY=${ARTIFACTS_API_KEY}
      - ARTIFACTS_API_URL=https://api.artifactsmmo.com
      - SPRING_DATA_MONGODB_URI=mongodb://mongo:27017/tellenn-artifacts
      - SPRING_DATA_MONGODB_DATABASE=artifacts
      - JAVA_OPTS=-Xmx2g -Xms1g
    deploy:
      resources:
        limits:
          memory: 4g
        reservations:
          memory: 2g
    depends_on:
      - mongo
    networks:
      - tellenn-network

  mongo:
    image: mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - tellenn-network

  ui:
    image: tellenn/ui-tellenn-artifacts-client:latest
    restart: always
    ports:
      - "8899:8080"
    depends_on:
      - app
    networks:
      - tellenn-network

  prometheus:
    image: prom/prometheus:latest
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - tellenn-network

  grafana:
    image: grafana/grafana:latest
    restart: always
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - tellenn-network

networks:
  tellenn-network:
    driver: bridge

volumes:
  mongo-data:
  prometheus-data:
  grafana-data:
